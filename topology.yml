name: uc1-vulnscan
hosts:
  - name: target
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: standard.small
  - name: scanner
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: m1.medium
routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: standard.small
networks:
  - name: lab-switch
    cidr: 192.168.20.0/24
    accessible_by_user: False
net_mappings:
  - host: target
    network: lab-switch
    ip: 192.168.20.5
  - host: scanner
    network: lab-switch
    ip: 192.168.20.10
router_mappings:
  - router: router
    network: lab-switch
    ip: 192.168.20.1
groups: []
